<!DOCTYPE html>
<html>
<head>
    <title>Cena 3 - Múons Corrigidos</title>
    <meta charset="utf-8">
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>

    <script>
        // Componente dt da Cena 2 para rastro elástico
        AFRAME.registerComponent('dt', {
            schema: { target: { type: 'string' }, speed: { type: 'number', default: 0.6 }, off: { type: 'vec3' } },
            init: function () { this.v = new THREE.Vector3(); },
            tick: function () {
                if (!this.elT) { this.elT = document.querySelector('#' + this.data.target); return; }
                this.v.copy(this.elT.object3D.position).add(this.data.off);
                this.el.object3D.position.lerp(this.v, this.data.speed);
            }
        });

        AFRAME.registerShader('grad', {
            schema: { c: { type: 'color', is: 'uniform' } },
            vertexShader: `
                varying vec2 v; 
                void main(){
                    v = uv; 
                    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                }`,
            fragmentShader: `
                varying vec2 v; 
                uniform vec3 c; 
                void main(){ 
                    gl_FragColor = vec4(c, 1.0 - v.y); 
                }`
        });
    </script>

    <style>
        .ui-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; font-family: sans-serif; color: white; }
        .card { background: rgba(0, 10, 20, 0.7); backdrop-filter: blur(8px); border: 1px solid; border-radius: 12px; pointer-events: auto; }
        .info-box { position: absolute; top: 20px; left: 20px; width: 320px; padding: 20px; border-color: #9370DB; }
        .control-box { position: absolute; bottom: 20px; left: 20px; width: 320px; padding: 20px; border-color: #00BFFF; }
        .control-group { margin-bottom: 15px; }
        .control-group label { display: block; font-size: 12px; margin-bottom: 5px; color: #bcacda; }
        input[type="range"], input[type="number"] { width: 100%; pointer-events: auto; background: #222; color: #fff; border: 1px solid #444; padding: 5px; }
        .nav-box { position: absolute; top: 20px; right: 20px; padding: 15px; border-radius: 5px; text-align: center; }
        .btn { border: none; padding: 8px 15px; border-radius: 3px; cursor: pointer; font-weight: bold; }
        .btn-1 { background: #444; color: white; }
        .btn-2 { background: #9370DB; color: white; }
        h2 { color: #9370DB; margin: 0 0 10px 0; }
        p { font-size: 14px; line-height: 1.6; margin: 0; text-align: justify; }
    </style>
</head>

<body>
    <div class="ui-layer">
        <div class="card info-box">
            <h2>Múons Corrigidos</h2>
            <p>O rastro de tracinhos agora brota corretamente atrás da esfera, que aponta para o oceano.</p>
        </div>

        <div class="card control-box">
            <div class="control-group">
                <label>Frequência: <span id="valFreq">1000</span>ms</label>
                <input type="range" id="inputFreq" min="100" max="2500" value="1000" oninput="updateInterval(this.value)">
            </div>
            <div class="control-group">
                <label>Meia-vida (Segundos):</label>
                <input type="number" id="inputLife" min="0.5" max="20" value="2.0" step="0.5" oninput="updateLife(this.value)">
            </div>
        </div>
        
        <div class="card nav-box">
            <button class="btn btn-1" onclick="location.href='index.html'">Cena 1</button>
            <button class="btn btn-1" onclick="location.href='cena2.html'">Cena 2</button>
            <button class="btn btn-2" onclick="location.href='cena3.html'">Cena 3</button>
        </div>
    </div>

    <a-scene id="scene" antialias="true">
        <a-assets>
            <img id="imSky" src="https://jocoteles.github.io/Minicurso-A-Frame-VR/TychoSkymap.t4_04096x02048.jpg">
        </a-assets>

        <a-camera position="0 1.6 0"></a-camera>
        <a-entity id="boat" position="0 -0.1 0" rotation="0 180 0">
            <a-box position="0 0.8 0" width="1.8" height="0.1" depth="3.8" material="color: #4b3117"></a-box>
            <a-cone position="0 0.4 -2" radius-bottom="0.9" height="1.6" rotation="-90 0 0" scale="1 1 0.3" material="color: #3b2107"></a-cone>
            <a-cone position="0 0.4 2" radius-bottom="0.9" height="1.6" rotation="90 0 0" scale="1 1 0.3" material="color: #3b2107"></a-cone>
        </a-entity>

        <a-sky src="#imSky" rotation="0 -90 0"></a-sky>
        <a-plane position="0 0 0" rotation="-90 0 0" width="1000" height="1000" material="color: #002244; opacity: 0.95; transparent: true"></a-plane>
        <a-entity light="type: ambient; color: #555"></a-entity>
        <a-entity light="type: directional; intensity: 0.8" position="-1 10 5"></a-entity>
    </a-scene>

    <script>
        let uid = 0;
        let spawnIntervalId;
        let halfLifeTime = 2000; 
        const scene = document.querySelector('#scene');

        const $mk = (parent, tag, attrs) => {
            const el = document.createElement(tag);
            for (const [k, v] of Object.entries(attrs)) el.setAttribute(k, v);
            parent.appendChild(el);
            return el;
        };

        function updateLife(val) { halfLifeTime = parseFloat(val) * 1000 || 500; }
        function updateInterval(val) {
            document.getElementById('valFreq').innerText = val;
            clearInterval(spawnIntervalId);
            spawnIntervalId = setInterval(spawnMuon, val);
        }

        const makeTrace = (ct, start, end, col, dly, dur) => {
            const dx = end.x - start.x;
            const dy = end.y - start.y;
            const dist = Math.sqrt(dx*dx + dy*dy);
            const dashLen = 0.3, gapLen = 0.15, step = dashLen + gapLen;
            const count = Math.floor(dist / step);
            const ang = -Math.atan2(dx, dy) * (180 / Math.PI);

            for (let i = 0; i < count; i++) {
                const t = i / count;
                const currX = start.x + dx * t;
                const currY = start.y + dy * t;
                $mk(ct, 'a-entity', {
                    geometry: `primitive: cylinder; radius: 0.02; height: ${dashLen}`,
                    material: `shader: flat; color: ${col}; opacity: 0.9`,
                    position: `${currX} ${currY} 0`,
                    rotation: `0 0 ${ang}`,
                    visible: 'false',
                    animation__v: `property: visible; from: false; to: true; dur: 0; delay: ${dly + (dur * t)}`
                });
            }
        };

        const makeTail = (ct, lead, col, sc, dly, dur, ang) => {
            const h = 2.5 * sc, off = h / 2;
            // CORREÇÃO: A rotação (ang + 180) garante que a cauda aponte para trás
            $mk(ct, 'a-entity', {
                geometry: `primitive:cone; radiusBottom:${0.08 * sc}; radiusTop:0.0; height:${h}; openEnded:true`, 
                material: `shader:grad; c:${col}; transparent:true; side:double; depthTest:false`, 
                position: `0 0 0`, 
                rotation: `0 0 ${ang + 180}`,
                dt: `target:${lead.id}; speed:0.4`, // Suavidade no rastro
                visible: 'false', 
                scale: '0 0 0',
                animation__v: `property:visible; from:false; to:true; dur:0; delay:${dly}`,
                animation__g: `property:scale; to:1 1 1; dur:300; delay:${dly}; easing:easeOutQuad`,
                animation__s: `property:scale; to:0 0 0; dur:300; delay:${dly + dur - 100}`
            });
        };

        const spawnParticle = (gen, startPos, endPos, duration, sobrevivente, totalDelay = 0) => {
            const col = gen === 1 ? "#9370DB" : (gen === 2 ? "#FFB6C1" : "#87CEEB");
            const sc = gen === 1 ? 1.4 : (gen === 2 ? 1.2 : 1.0);
            
            const ct = $mk(scene, 'a-entity', { position: `${startPos.x} 0 ${startPos.z}` });
            const dx = endPos.x - startPos.x;
            const dy = endPos.y - startPos.y; // Mudança: Cálculo relativo à altura de nascimento
            
            // CORREÇÃO: Ângulo agora usa a diferença de altura correta
            const ang = -Math.atan2(dx, -dy) * (180 / Math.PI);

            const mId = 'm' + uid++;
            const head = $mk(ct, 'a-entity', {
                id: mId,
                visible: 'false',
                position: `0 ${startPos.y} 0`,
                animation: `property:position; to:${dx} ${endPos.y} 0; dur:${duration}; easing:linear; delay:${totalDelay}`,
                animation__show: `property:visible; to:true; dur:0; delay:${totalDelay}`
            });

            $mk(head, 'a-entity', {
                geometry: `primitive:sphere; radius:${0.2 * sc}`,
                material: `shader:flat; color:${col}`,
                animation__out: `property:scale; to:0 0 0; dur:200; delay:${totalDelay + duration - 200}`
            });

            makeTrace(ct, {x: 0, y: startPos.y}, {x: dx, y: endPos.y}, col, totalDelay, duration);
            makeTail(ct, head, col, sc, totalDelay, duration, ang);

            if (gen < 3) {
                setTimeout(() => {
                    const nextGen = gen + 1;
                    const spread = gen === 1 ? 3.5 : 1.5; 
                    for(let i = 0; i < 2; i++) {
                        const side = i === 0 ? -1 : 1;
                        let targetY = (nextGen === 3 && sobrevivente) ? 0 : Math.max(2, endPos.y - 12);
                        spawnParticle(nextGen, endPos, {x: endPos.x + (spread * side), y: targetY, z: endPos.z}, halfLifeTime, sobrevivente, 0);
                    }
                }, duration + totalDelay);
            }
            setTimeout(() => { if(ct.parentNode) ct.parentNode.removeChild(ct); }, duration + totalDelay + 5000);
        };

        const spawnMuon = () => {
            const spawnHeight = 35; 
            const rndX = (Math.random() * 20) - 10; 
            const rndZ = -(Math.random() * 10 + 7); 
            const sobrevivente = Math.random() <= 0.30; 
            let deathY = 24; 
            spawnParticle(1, {x: rndX, y: spawnHeight, z: rndZ}, {x: rndX, y: deathY, z: rndZ}, halfLifeTime, sobrevivente, 0);
        };

        spawnIntervalId = setInterval(spawnMuon, 1500);
    </script>
</body>
</html>
